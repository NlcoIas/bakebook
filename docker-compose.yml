services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bakebook
      POSTGRES_PASSWORD: bakebook
      POSTGRES_DB: bakebook
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakebook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
